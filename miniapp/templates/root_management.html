{% extends "base.html" %}
{% block title %}Root Management{% endblock %}

{% block content %}
<div class="p-4 space-y-4">
  <div class="flex items-center justify-between">
    <h1 id="rmTitle" class="text-2xl font-bold">Root Admin Management</h1>
    <div class="flex gap-2">
      <a id="rmBackBtn" href="/settings" class="px-4 py-2 rounded-xl border border-gray-300">Back to Settings</a>
      <button id="rmAddBtn" onclick="openCreateAdmin()" class="px-4 py-2 rounded-xl bg-blue-600 text-white font-semibold">+ Add Admin</button>
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow p-4 overflow-x-auto">
    <div class="mb-3">
      <input id="rmSearch"
             type="text"
             oninput="onRootSearch(this.value)"
             class="w-full md:w-[420px] px-3 py-2 rounded-xl border border-gray-300"
             placeholder="Search...">
    </div>
    <table class="w-full min-w-[980px] text-sm">
      <thead>
        <tr class="text-left text-gray-700 border-b">
          <th id="rmThId" class="py-2">ID</th>
          <th id="rmThUsername" class="py-2">Username</th>
          <th id="rmThTelegram" class="py-2">Telegram ID</th>
          <th id="rmThFilials" class="py-2">Filials</th>
          <th id="rmThExpiry" class="py-2">Expiry Date</th>
          <th id="rmThActive" class="py-2">Active</th>
          <th id="rmThActions" class="py-2">Actions</th>
        </tr>
      </thead>
      <tbody id="rootAdminTable"></tbody>
    </table>
  </div>
</div>

<div id="branchModal" class="fixed inset-0 hidden z-50 bg-black/40 items-center justify-center">
  <div class="bg-white w-[92%] max-w-lg rounded-2xl p-4 space-y-3">
    <h3 id="rmBranchTitle" class="text-lg font-semibold">Assign Filials</h3>
    <div id="branchModalList" class="max-h-72 overflow-auto space-y-2"></div>
    <div class="flex gap-2">
      <button id="rmBranchSave" onclick="saveAdminBranches()" class="flex-1 py-2 rounded-xl bg-blue-600 text-white">Save</button>
      <button id="rmBranchCancel" onclick="closeBranchModal()" class="flex-1 py-2 rounded-xl bg-gray-200">Cancel</button>
    </div>
  </div>
</div>

<div id="createAdminModal" class="fixed inset-0 hidden z-50 bg-black/40 items-center justify-center">
  <div class="bg-white w-[92%] max-w-lg rounded-2xl p-4 space-y-3">
    <h3 id="rmCreateTitle" class="text-lg font-semibold">Create Admin</h3>
    <input id="newAdminUsername" class="w-full px-3 py-2 rounded-lg border" placeholder="Username">
    <input id="newAdminTelegram" class="w-full px-3 py-2 rounded-lg border" placeholder="Telegram ID">
    <input id="newAdminPassword" type="password" class="w-full px-3 py-2 rounded-lg border" placeholder="Password">
    <div class="flex gap-2">
      <button id="rmCreateSave" onclick="createAdmin()" class="flex-1 py-2 rounded-xl bg-blue-600 text-white">Create</button>
      <button id="rmCreateCancel" onclick="closeCreateAdmin()" class="flex-1 py-2 rounded-xl bg-gray-200">Cancel</button>
    </div>
  </div>
</div>

<script src="/static/js/root_management.js?v={{version}}"></script>
{% endblock %}
