{% extends "base.html" %}
{% block title %}{{t("payment_history")}}{% endblock %}

{% block content %}

<script>
  let CURRENT_BRANCH = {{ current_branch_id }};
</script>

<div class="p-4 space-y-4">

  <!-- HEADER -->

<div class="bg-card rounded-2xl p-4 shadow space-y-3">

  <h1 class="text-xl font-semibold">📜 {{t("payment_history")}}</h1>

  <div class="flex flex-wrap gap-3 items-center">

    <select id="filterMonth"
            class="px-3 py-2 rounded-lg border bg-transparent"></select>

    <select id="filterYear"
            class="px-3 py-2 rounded-lg border bg-transparent"></select>

    <button onclick="loadPaymentHistory()"
            class="px-4 py-2 rounded-xl bg-tgButton text-white font-medium">
      {{t("load")}}
    </button>

    <input
      id="searchInput"
      placeholder='{{t("search_customer_passport")}}'
      class="flex-1 min-w-[200px] px-4 py-2 rounded-xl border bg-transparent"
    />
  </div>

</div>


  <!-- PAYMENTS LIST -->
  <div class="bg-card rounded-2xl shadow overflow-hidden">

    <!-- Header (desktop hint) -->
    <div class="hidden sm:grid grid-cols-7 gap-2 px-4 py-3 text-sm text-tgHint border-b">
      <div>{{t("date")}}</div>
      <div>{{t("customer")}}</div>
      <div>{{t("passport_id")}}</div>
      <div>{{t("room")}}</div>
      <div>{{t("bed")}}</div>
      <div class="text-right">{{t("amount")}}</div>
      <div>{{t("method")}}</div>
    </div>

    <!-- Body -->
    <div id="historyTable" class="space-y-3">
      <!-- rows injected by JS -->
    </div>

  </div>

</div>

<script src="/static/js/payment_history.js"></script>

{% endblock %}
