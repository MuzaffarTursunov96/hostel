{% extends "base.html" %}
{% block title %}{{t("rooms_and_beds")}}{% endblock %}

{% block content %}
<!-- <script>
  let CURRENT_BRANCH = {{ current_branch_id }};
</script> -->
<style>
  .room-photos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
    gap: 10px;
  }
  .room-photo-card {
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
  }
  .room-photo-img {
    width: 100%;
    height: 88px;
    object-fit: cover;
    background: #f3f4f6;
  }
  .room-photo-actions {
    display: flex;
    gap: 6px;
    padding: 8px;
  }
  .room-photo-actions button {
    flex: 1;
    border: 0;
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .room-photo-cover {
    background: #dbeafe;
    color: #1d4ed8;
  }
  .room-photo-delete {
    background: #fee2e2;
    color: #b91c1c;
  }
</style>

<div class="p-4 space-y-6">

  <!-- TITLE -->
  <h1 class="text-lg font-semibold flex items-center gap-2">
    🏠 {{t("rooms_and_beds")}}
  </h1>

  <!-- ROOMS CARD -->
  <div class="bg-card rounded-2xl shadow p-4 space-y-3">

    <div class="flex justify-between items-center">
      <span class="font-semibold">{{t("rooms")}}</span>
      <button onclick="addRoom()" id="addRoomBtn"
              class="w-9 h-9 flex items-center justify-center rounded-full bg-tgButton text-white text-lg">
        +
      </button>
    </div>

    <!-- ROOMS LIST -->
    <div id="roomsList"
         class="flex gap-2 overflow-x-auto pb-2">
      <!-- injected -->
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
      <input id="roomTypeInput"
             type="text"
             class="sm:col-span-2 px-3 py-2 rounded-lg border"
             placeholder="{{ t('room_type_optional') }}">
      <button onclick="saveRoomType()"
              class="py-2 rounded-xl border font-medium">
        {{ t("save_room_type") }}
      </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
      <input id="roomFixedPriceInput"
             type="number"
             step="0.01"
             min="0"
             class="sm:col-span-2 px-3 py-2 rounded-lg border"
             placeholder="{{ t('fixed_price_optional') }}">
      <button onclick="saveRoomPrice()"
              class="py-2 rounded-xl bg-tgButton text-white font-medium">
        {{ t("save_room_price") }}
      </button>
    </div>
    <button onclick="clearRoomPrice()"
            class="w-full py-2 rounded-xl border font-medium">
      {{ t("clear_price_agreement") }}
    </button>

    <button onclick="deleteRoom()"
            class="w-full mt-2 py-3 rounded-xl bg-red-500 text-white font-medium">
      🗑 {{t("delete_room")}}
    </button>
  </div>

  <!-- BEDS CARD -->
  <div class="bg-card rounded-2xl shadow p-4 space-y-3">

    <div class="flex justify-between items-center">
      <span class="font-semibold" id="bedsTitle">{{t("beds")}}</span>
      <button onclick="addBed()" id="addBedBtn"
              class="w-9 h-9 flex items-center justify-center rounded-full bg-tgButton text-white text-lg">
        +
      </button>
    </div>

    <!-- BEDS GRID -->
    <div id="bedsList"
         class="grid grid-cols-2 gap-3">
      <!-- injected -->
    </div>

    <!-- ACTIONS -->
    <div class="pt-2">
      <button onclick="deleteBed()"
              class="w-full py-3 rounded-xl bg-red-500 text-white font-medium">
        🗑 {{t("delete_bed")}}
      </button>
      <button onclick="openEditBed()"
              class="w-full mt-2 py-3 rounded-xl bg-tgButton text-white font-medium">
        ✏️ {{t("edit_bed")}}
      </button>

    </div>


  </div>

  <!-- ROOM PHOTOS CARD -->
  <div class="bg-card rounded-2xl shadow p-4 space-y-3">
    <div class="flex justify-between items-center gap-3">
      <span class="font-semibold">{{ t("room_photos") }}</span>
      <label class="px-3 py-2 rounded-xl bg-tgButton text-white text-sm cursor-pointer">
        {{ t("upload_room_photos") }}
        <input id="roomPhotoInput" type="file" accept="image/*" multiple class="hidden" onchange="uploadRoomPhotos()" />
      </label>
    </div>

    <p class="text-xs text-tgHint">{{ t("max_room_images_hint") }}</p>

    <div id="roomPhotosList" class="room-photos-grid"></div>
  </div>

</div>

<!-- ADD ROOM MODAL -->
<div id="roomModal"
     class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">

  <div class="bg-white rounded-2xl w-[90%] max-w-sm p-5 space-y-4">
    <h2 class="text-lg font-semibold flex items-center gap-2">
      🏠 {{ t("add_room") }}
    </h2>

    <!-- ROOM NAME -->
    <div>
      <label class="text-sm text-gray-600">
        {{ t("room_name") }}
      </label>
      <input
        id="roomNameInput"
        type="text"
        class="w-full mt-1 px-3 py-2 rounded-xl border focus:outline-none focus:ring-2 focus:ring-tgButton"
        placeholder="{{ t('enter_room_name') }}"
      />
    </div>
    <div>
      <label class="text-sm text-gray-600">{{ t("room_type_optional") }}</label>
      <input
        id="roomTypeCreateInput"
        type="text"
        class="w-full mt-1 px-3 py-2 rounded-xl border focus:outline-none focus:ring-2 focus:ring-tgButton"
        placeholder="{{ t('room_type_optional') }}"
      />
    </div>
    <div>
      <label class="text-sm text-gray-600">{{ t("fixed_price_optional") }}</label>
      <input
        id="roomPriceInput"
        type="number"
        step="0.01"
        min="0"
        class="w-full mt-1 px-3 py-2 rounded-xl border focus:outline-none focus:ring-2 focus:ring-tgButton"
        placeholder="{{ t('fixed_price_optional') }}"
      />
    </div>

    <!-- ACTIONS -->
    <div class="flex gap-2 pt-2">
      <button onclick="closeRoomModal()"
              class="flex-1 py-2 rounded-xl border">
        {{ t("cancel") }}
      </button>

      <button onclick="submitRoom()"
              class="flex-1 py-2 rounded-xl bg-tgButton text-white font-medium">
        {{ t("create") }}
      </button>
    </div>
  </div>
</div>


<div id="editBedModal"
     class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">

  <div class="bg-white rounded-2xl w-[90%] max-w-sm p-5 space-y-4">

    <h2 class="text-lg font-semibold">
      🛏 {{t("edit_bed")}}
    </h2>

    <div>
      <label class="text-sm text-gray-600">{{t("bed_type")}}</label>
      <select id="editBedType"
              class="w-full mt-1 px-3 py-2 rounded-xl border">
        <option value="single">{{t("single_bed")}}</option>
        <option value="double">{{t("double_bed")}}</option>
        <option value="child">{{t("child_bed")}}</option>
      </select>
    </div>
    <div>
      <label class="text-sm text-gray-600">{{ t("fixed_price_optional") }}</label>
      <input id="editBedPrice"
             type="number"
             step="0.01"
             min="0"
             class="w-full mt-1 px-3 py-2 rounded-xl border"
             placeholder="{{ t('fixed_price_optional') }}">
    </div>

    <div class="flex gap-2 pt-2">
      <button onclick="closeEditBedModal()"
              class="flex-1 py-2 rounded-xl border">
        {{t("cancel")}}
      </button>

      <button onclick="saveBedType()"
              class="flex-1 py-2 rounded-xl bg-tgButton text-white font-medium">
        {{t("save")}}
      </button>
    </div>

  </div>
</div>



<script src="/static/js/rooms.js?v={{version}}"></script>
{% endblock %}
