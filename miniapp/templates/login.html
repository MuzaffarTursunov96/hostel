<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Loading...</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      z-index: 9999;
      transition: opacity 0.25s ease;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(0,0,0,0.1);
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 12px;
      font-size: 15px;
      opacity: 0.8;
      white-space: pre-line;
      text-align: center;
      max-width: 90vw;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div id="app-loading" class="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">Connecting to Telegram...</div>
</div>

<script>
const tg = window.Telegram.WebApp;
const ROOT_ADMIN_TELEGRAM = "muzaffar_developer";
const ROOT_ADMIN_PHONE = "+998901234567";

// Telegram init
tg.ready();
tg.expand();

const loader = document.getElementById("app-loading");
const text = loader.querySelector(".loading-text");

function showError(message) {
  text.innerText = message;
}

function withAdminContact(message) {
  return (
    message +
    "\n\nContact admin:" +
    "\nTelegram: @" + ROOT_ADMIN_TELEGRAM +
    "\nPhone: " + ROOT_ADMIN_PHONE
  );
}

if (!tg.initData) {
  showError(withAdminContact("Please open this app from Telegram"));
} else {
  fetch("/auth/telegram", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ initData: tg.initData })
  })
  .then(async (r) => {
    const data = await r.json().catch(() => ({}));
    return { ok: r.ok, status: r.status, data };
  })
  .then(({ ok, data }) => {
    if (ok && data.ok) {
      loader.style.opacity = "0";
      setTimeout(() => {
        window.location.href = "/dashboard?v=" + Date.now();
      }, 250);
      return;
    }

    const msg = data.error || data.detail || "Telegram authentication failed";
    showError(withAdminContact(msg));
  })
  .catch(() => {
    showError(withAdminContact("Network error. Please try again."));
  });
}
</script>

</body>
</html>
