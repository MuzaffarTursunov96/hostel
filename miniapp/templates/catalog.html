<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HMSUZ Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/catalog.css?v={{version}}">
</head>
<body>
  <div class="bg-glow"></div>
  <header class="topbar">
    <a class="back-link" href="/">HMSUZ</a>
    <div class="topbar-right">
      <button id="authBtn" type="button" class="lang-btn auth-btn" data-i18n="login">Login</button>
      <div id="profileMenuWrap" class="profile-menu-wrap" hidden>
        <button id="profileBtn" type="button" class="profile-btn" aria-label="Profile">👤</button>
        <div id="profileMenu" class="profile-menu" hidden>
          <div id="profileName" class="profile-name">User</div>
          <button id="profileLogoutBtn" type="button" class="profile-logout" data-i18n="logout">Logout</button>
        </div>
      </div>
      <div class="lang-switch">
        <button type="button" class="lang-btn active" data-lang="uz">UZ</button>
        <button type="button" class="lang-btn" data-lang="ru">RU</button>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <h1 data-i18n="title">Hotel va Hostel katalogi</h1>
      <p data-i18n="subtitle">Rasm, reyting va joylashuv bo'yicha mos variantni tanlang.</p>
    </section>

    <section class="filters-toolbar">
      <div class="toolbar-actions">
        <button id="toggleFiltersBtn" class="ghost-btn filter-toggle-btn" type="button">
          <span class="filter-toggle-icon">&#128269;</span>
          <span id="toggleFiltersText" data-i18n="show_filters">Filterni ko'rsatish</span>
        </button>
        <button id="myHistoryBtn" class="ghost-btn filter-toggle-btn" type="button" data-i18n="my_history">Tarixim</button>
      </div>
    </section>

    <section id="filtersPanel" class="filters collapsed" hidden>
      <input id="searchInput" type="text" placeholder="Qidirish..." data-ph="search_ph">
      <div class="filters-row">
        <input id="cityInput" type="text" data-ph="city_ph" placeholder="Shahar">
        <input id="regionInput" type="text" data-ph="region_ph" placeholder="Hudud">
      </div>
      <div class="filters-row">
        <select id="priceModeFilter">
          <option value="day" data-i18n="price_mode_day">Kunlik narx</option>
          <option value="hour" data-i18n="price_mode_hour">Soatlik narx</option>
          <option value="month" data-i18n="price_mode_month">Oylik narx</option>
        </select>
        <select id="roomTypeFilter">
          <option value="" data-i18n="all_room_types">Barcha xona turlari</option>
        </select>
      </div>
      <div class="filters-row">
        <select id="ratingFilter">
          <option value="0" data-i18n="all_ratings">Barcha reytinglar</option>
          <option value="3">3.0+</option>
          <option value="4">4.0+</option>
          <option value="4.5">4.5+</option>
        </select>
        <select id="distanceFilter">
          <option value="" data-i18n="any_distance">Masofa: hammasi</option>
          <option value="3">3 km</option>
          <option value="5">5 km</option>
          <option value="10">10 km</option>
          <option value="20">20 km</option>
          <option value="50">50 km</option>
        </select>
      </div>
      <div class="price-range">
        <input id="priceMinInput" type="number" min="0" step="1000" data-ph="min_price_ph" placeholder="Min narx">
        <input id="priceMaxInput" type="number" min="0" step="1000" data-ph="max_price_ph" placeholder="Max narx">
      </div>
      <div class="price-slider-wrap">
        <input id="priceMinRange" type="range" min="0" max="10000000" step="1000" value="0">
        <input id="priceMaxRange" type="range" min="0" max="10000000" step="1000" value="10000000">
        <div class="price-slider-labels">
          <span id="priceMinLabel">0</span>
          <span id="priceMaxLabel">10 000 000</span>
        </div>
      </div>
      <div class="geo-tools">
        <button id="findNearestBtn" class="ghost-btn" data-i18n="nearest_by_gps">Yaqinlarni GPS bo'yicha topish</button>
      </div>
      <div class="filter-actions">
        <button id="refreshBtn" class="solid-btn" data-i18n="refresh">Yangilash</button>
        <button id="clearFiltersBtn" class="ghost-btn" data-i18n="clear_filters">Filterni bekor qilish</button>
      </div>
    </section>

    <section id="cards" class="cards"></section>
  </main>

  <div id="galleryModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="galleryTitle">Photos</h3>
        <button id="closeGallery" class="ghost-btn">X</button>
      </div>
      <div id="galleryGrid" class="gallery-grid"></div>
    </div>
  </div>

  <div id="reportModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="reportTitle">Report</h3>
        <button id="closeReport" class="ghost-btn">X</button>
      </div>
      <form id="reportForm" class="report-form">
        <input id="reportBranchId" type="hidden">
        <label>
          <span data-i18n="room_label">Xona/Yotoq</span>
          <input id="reportRoomLabel" type="text" placeholder="Masalan: 203 xona, 2-kravat" data-ph="room_label_ph">
        </label>
        <label>
          <span data-i18n="report_message">Xabar</span>
          <textarea id="reportMessage" rows="4" required data-ph="report_message_ph" placeholder="Xona holati haqida yozing..."></textarea>
        </label>
        <label>
          <span data-i18n="contact_optional">Aloqa (ixtiyoriy)</span>
          <input id="reportContact" type="text" placeholder="+998..." data-ph="contact_ph">
        </label>
        <label>
          <span data-i18n="photo_optional">Rasm (ixtiyoriy)</span>
          <input id="reportPhoto" type="file" accept="image/*">
        </label>
        <button type="submit" class="solid-btn" data-i18n="send_report">Yuborish</button>
      </form>
    </div>
  </div>

  <div id="detailsModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="detailsTitle">Details</h3>
        <button id="closeDetails" class="ghost-btn">X</button>
      </div>
      <div id="detailsBody" class="details-body"></div>
    </div>
  </div>

  <div id="bookingModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="bookingTitle">Booking request</h3>
        <button id="closeBooking" class="ghost-btn">X</button>
      </div>
      <form id="bookingForm" class="report-form">
        <input id="bookingBranchId" type="hidden">
        <div class="booking-readonly-grid">
          <div class="booking-readonly-item">
            <span data-i18n="room_type_label">Xona turi</span>
            <b id="bookingRoomTypeLabel">-</b>
          </div>
          <div class="booking-readonly-item">
            <span data-i18n="rent_type_label">Ijara turi</span>
            <b id="bookingRentTypeLabel">-</b>
          </div>
        </div>
        <label>
          <span data-i18n="full_name_optional">Ism (ixtiyoriy)</span>
          <input id="bookingName" type="text" placeholder="Ism familiya" data-ph="full_name_optional">
        </label>
        <label>
          <span data-i18n="phone_required">Telefon raqam (majburiy)</span>
          <input id="bookingPhone" type="text" required placeholder="+998..." data-ph="phone_required">
        </label>
        <label>
          <span data-i18n="room_or_bed">Xona yoki yotoq raqami</span>
          <input id="bookingRoomBed" type="text" placeholder="Masalan: 203 xona yoki 2-kravat" data-ph="room_or_bed">
        </label>
        <label>
          <span data-i18n="checkin_date">Kelish sanasi</span>
          <input id="bookingCheckin" type="date">
        </label>
        <label>
          <span data-i18n="checkout_date">Ketish sanasi</span>
          <input id="bookingCheckout" type="date">
        </label>
        <label>
          <span data-i18n="report_message">Xabar</span>
          <textarea id="bookingMessage" rows="3" data-ph="booking_message_ph" placeholder="Qo'shimcha izoh..."></textarea>
        </label>
        <button type="submit" class="solid-btn" data-i18n="send_booking_request">Bron ariza yuborish</button>
      </form>
    </div>
  </div>

  <div id="historyModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="historyTitle">Tarixim</h3>
        <button id="closeHistory" class="ghost-btn">X</button>
      </div>
      <div id="historyBody" class="details-body"></div>
    </div>
  </div>

  <script src="/static/js/catalog.js?v={{version}}"></script>
</body>
</html>
