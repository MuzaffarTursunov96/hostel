{% extends "base.html" %}
{% block title %}{{t("settings")}}{% endblock %}

{% block content %}

<style>
  .lang-btn.active {
    background-color: #2563eb;
    color: white;
    border-color: #2563eb;
  }
</style>



<div class="p-4 space-y-5">

  <!-- TITLE -->
  <h1 class="text-xl font-semibold">⚙ {{t("settings")}}</h1>

  <div class="admin-only">
    <!-- ================= CREATE / DELETE USER ================= -->
    <div class="bg-card rounded-2xl shadow p-4 space-y-3 admin-only">

      <h3 class="font-semibold">👤 {{t("users")}}</h3>

      <!-- CREATE -->
      <input id="newUsername"
            class="w-full px-3 py-2 rounded-lg border bg-transparent"
            placeholder="{{t('username')}}">

      <input id="newUserPassword"
            type="password"
            class="w-full px-3 py-2 rounded-lg border bg-transparent"
            placeholder="{{t('password')}}">

      <button onclick="createUser()"
              class="w-full py-3 rounded-xl bg-blue-500 text-white font-semibold">
        {{t("add")}}
      </button>

      <hr class="opacity-30">

      <!-- DELETE -->
      <select id="userSelect"
              class="w-full px-3 py-2 rounded-lg border bg-transparent">
      </select>

      <button onclick="openUserBranchModal()"
              class="w-full py-3 rounded-xl bg-blue-500 text-white font-semibold">
        {{t("assign_branches")}}
      </button>

      <button onclick="deleteUser()"
              class="w-full py-3 rounded-xl bg-red-500 text-white font-semibold">
        {{t("delete")}}
      </button>

    </div>




    <!-- ================= BRANCH MANAGEMENT ================= -->
    <div class="bg-card rounded-2xl shadow p-4 space-y-3 admin-only">

      <h3 class="font-semibold">🏢 {{t("branch_management")}}</h3>

      <!-- SELECT BRANCH -->
      <select id="branchSelect"
              class="w-full px-3 py-2 rounded-lg border bg-transparent">
      </select>

      <!-- CREATE -->
      <input id="newBranchName"
            class="w-full px-3 py-2 rounded-lg border bg-transparent"
            placeholder="{{t('branch_name')}}">

      <button onclick="createBranch()"
              class="w-full py-3 rounded-xl bg-blue-500 text-white font-semibold">
        {{t("add")}}
      </button>

      <!-- DELETE -->
      <button onclick="deleteBranch()"
              class="w-full py-3 rounded-xl bg-red-500 text-white font-semibold">
        {{t("delete")}}
      </button>

    </div>

  </div>

  <!-- ================= PASSWORD ================= -->
  <div class="bg-card rounded-2xl shadow p-4 space-y-3">

    <h3 class="font-semibold">🔐 {{t("change_password")}}</h3>

    <input id="oldPassword"
           type="password"
           class="w-full px-3 py-2 rounded-lg border bg-transparent"
           placeholder='{{t("current_password")}}'>

    <input id="newPassword"
           type="password"
           class="w-full px-3 py-2 rounded-lg border bg-transparent"
           placeholder='{{t("new_password")}}'>

    <input id="confirmPassword"
           type="password"
           class="w-full px-3 py-2 rounded-lg border bg-transparent"
           placeholder='{{t("confirm_password")}}'>

    <button onclick="changePassword()"
            class="w-full py-3 rounded-xl bg-red-500 text-white font-semibold">
      {{t("save")}}
    </button>

  </div>

  <!-- ================= LANGUAGE ================= -->
  <div class="bg-card rounded-2xl shadow p-4 space-y-3">

    <h3 class="font-semibold">🌐 {{t("language")}}</h3>

    <div class="flex gap-3">
      <button id="lang-ru"
              onclick="setLanguage('ru')"
              class="lang-btn flex-1 py-3 rounded-xl border font-medium">
        🇷🇺 {{t("russian")}}
      </button>

      <button id="lang-uz"
              onclick="setLanguage('uz')"
              class="lang-btn flex-1 py-3 rounded-xl border font-medium">
        🇺🇿 {{t("uzbek")}}
      </button>
    </div>


  </div>

</div>


<!-- ================= USER → BRANCH MODAL ================= -->
<div id="userBranchModal"
     class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center">

  <div class="bg-white rounded-2xl w-[90%] max-w-md p-4 space-y-3">

    <h3 class="font-semibold text-lg">
      🔗 {{t("assign_branches")}}
    </h3>

    <div id="branchCheckboxList" class="space-y-2"></div>

    <div class="flex gap-2 pt-3">
      <button onclick="saveUserBranches()"
              class="flex-1 bg-blue-500 text-white py-2 rounded-xl">
        {{t("save")}}
      </button>

      <button onclick="closeUserBranchModal()"
              class="flex-1 bg-gray-300 py-2 rounded-xl">
        {{t("cancel")}}
      </button>
    </div>

  </div>
</div>



<script src="/static/js/settings.js?v={{version}}"></script>

{% endblock %}
