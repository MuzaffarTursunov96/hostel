{% extends "base.html" %}
{% block title %}New Booking{% endblock %}

{% block content %}

<!-- <script>
  let CURRENT_BRANCH = {{ current_branch_id }};
</script> -->

<div class="p-4 space-y-4">

  <!-- HEADER -->
  <!-- HEADER -->
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-semibold flex items-center gap-2">
      📝 {{t("new_booking")}}
    </h1>

    <button
      onclick="openBookingHistory()"
      class="flex items-center gap-1.5
            px-3 py-1.5
            rounded-lg
            border
            text-sm
            text-tgHint
            hover:text-tgButton
            hover:border-tgButton
            transition">

      📜 <span class="hidden sm:inline">{{t("payment_history")}}</span>
    </button>
  </div>



  <!-- ROOM -->
  <div class="bg-card rounded-2xl p-4 shadow space-y-2">
    <label class="text-sm text-tgHint">{{t("room")}}</label>
    <select id="roomSelect"
            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-transparent">
    </select>
  </div>

  <!-- DATES -->
  <div class="bg-card rounded-2xl p-4 shadow grid grid-cols-2 gap-3">

    <!-- CHECK IN -->
    <div>
      <label class="text-sm text-tgHint">
        {{t("check_in")}}
      </label>
      <input type="date" id="checkin"
            class="w-full px-3 py-2 rounded-lg border bg-transparent">
    </div>

    <!-- CHECK OUT -->
    <div>
      <label class="text-sm text-tgHint">
        {{t("check_out")}}
      </label>
      <input type="date" id="checkout"
            class="w-full px-3 py-2 rounded-lg border bg-transparent">
    </div>

    <!-- NOTIFY DATE -->
    <div class="col-span-2">
      <label class="text-sm text-tgHint flex items-center gap-1">
        🔔 {{t("notify_date")}}
      </label>
      <input type="date"
            id="notifyDate"
            class="w-full px-3 py-2 rounded-lg border bg-transparent">
      <p class="text-xs text-gray-400 mt-1">
        {{t("notify_date_hint")}}
      </p>
    </div>

  </div>


  <!-- BEDS -->
  <div class="bg-card rounded-2xl p-4 shadow space-y-2">
    <label class="text-sm text-tgHint">{{t("available_beds")}}</label>
    <div id="bedsList" class="flex flex-wrap gap-2"></div>
  </div>

  <!-- CUSTOMER -->
  <div class="bg-card rounded-2xl p-4 shadow space-y-3 relative">
    <!-- CUSTOMER NAME -->
    <div class="relative">
      <label class="text-sm text-tgHint">{{t("customer_name")}}</label>

      <input type="text"
            id="customerName"
            autocomplete="off"
            class="w-full px-3 py-2 rounded-lg border bg-transparent"
            placeholder="{{t('select_or_type_customer')}}">

      <!-- DROPDOWN -->
      <div id="customerDropdown"
          class="absolute z-50 mt-1 w-full bg-white border rounded-xl shadow-lg hidden max-h-56 overflow-y-auto">
      </div>
    </div>

    <!-- PASSPORT + CONTACT -->
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="text-sm text-tgHint">{{t("passport_id")}}</label>
        <input type="text" id="passport"
              class="w-full px-3 py-2 rounded-lg border bg-transparent"
              style="text-transform: uppercase;">
      </div>

      <div>
        <label class="text-sm text-tgHint">{{t("contact_info")}}</label>
        <input type="text" id="contact"
              class="w-full px-3 py-2 rounded-lg border bg-transparent">
      </div>
    </div>

  </div>


  <!-- PAYMENT -->
  <div class="bg-card rounded-2xl p-4 shadow grid grid-cols-2 gap-3">
    <div>
      <label class="text-sm text-tgHint">{{t("total_amount")}}</label>
      <input type="number" id="total"
             class="w-full px-3 py-2 rounded-lg border bg-transparent">
    </div>
    <div>
      <label class="text-sm text-tgHint">{{t("paid_amount")}}</label>
      <input type="number" id="paid"
             class="w-full px-3 py-2 rounded-lg border bg-transparent">
    </div>
  </div>

  <!-- REMAINING -->
  <div class="text-sm font-semibold">
    {{t("remaining")}}: <span id="remaining">0.00</span>
  </div>

  <!-- ACTION -->
  <button onclick="confirmBooking()"
          id="confirmBookingBtn"
          class="w-full py-4 rounded-2xl bg-tgButton text-white font-semibold">
    ✅ {{t("confirm_booking")}}
  </button>

</div>


<!-- ================= BOOKING HISTORY MODAL ================= -->
<div id="bookingHistoryModal" class="fixed inset-0 z-50 hidden">

  <div class="absolute inset-0 bg-black/50"
       onclick="closeBookingHistory()"></div>

  <div class="absolute bottom-0 left-0 right-0 bg-card rounded-t-2xl max-h-[90vh] overflow-hidden">

    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b">
      <h3 class="font-semibold">📜 {{t("booking_history")}}</h3>
      <button onclick="closeBookingHistory()">✕</button>
    </div>

    <!-- Filters -->
    <div class="p-4 flex gap-2 flex-wrap">
      <input type="date" id="bhFrom"
             class="px-3 py-2 rounded-lg border bg-transparent">

      <input type="date" id="bhTo"
             class="px-3 py-2 rounded-lg border bg-transparent">

      <input id="bhSearch"
             placeholder="{{t('search_customer_passport')}}"
             class="flex-1 min-w-[160px] px-3 py-2 rounded-lg border bg-transparent">

      <button onclick="loadBookingHistory()"
              class="px-4 py-2 rounded-xl bg-tgButton text-white">
        {{t("filter")}}
      </button>
    </div>

    <!-- Table -->
    <div id="bookingHistoryTable"
         class="px-4 pb-6 overflow-y-auto max-h-[65vh] divide-y">
      <!-- rows injected -->
    </div>

  </div>
</div>


<script src="/static/js/booking.js?v={{version}}"></script>

{% endblock %}
