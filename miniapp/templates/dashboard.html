{% extends "base.html" %}
{% block title %}{{t("dashboard")}}{% endblock %}

{% block content %}

<script>
  let CURRENT_BRANCH = {{ current_branch_id }};
</script>

<!-- HEADER -->
<div class="p-4 space-y-4">

  <div class="flex items-center justify-between px-4 pt-4">
  <h1 class="text-base font-semibold flex items-center gap-2">
    🏨 {{t("room_availability_now")}}
  </h1>

  <button
    onclick="openActiveBookings()"
    class="px-3 py-1.5 rounded-lg bg-tgButton text-white text-xs font-medium">
    📅 {{t("active_bookings")}}
  </button>

  <button
    onclick="openRefunds()"
    class="px-3 py-1.5 rounded-lg border border-gray-300 text-sm">
    ↩️ {{ t("refunds") }}
  </button>

</div>


  <!-- FILTERS -->
  <div class="bg-card rounded-2xl p-4 shadow space-y-3">

    <div class="flex items-center gap-2">
      <input type="date" id="fromDate"
             class="flex-1 px-3 py-2 rounded-lg border border-gray-300 bg-transparent">

      <span class="text-tgHint">—</span>

      <input type="date" id="toDate"
             class="flex-1 px-3 py-2 rounded-lg border border-gray-300 bg-transparent">
    </div>

    <div class="flex gap-2">
      <button onclick="applyFilter()"
              class="flex-1 py-2 rounded-xl bg-tgButton text-white font-medium">
        🔍 {{t("filter")}}
      </button>

      <button onclick="resetFilter()"
              class="px-4 py-2 rounded-xl border border-red-400 text-red-500">
        ✕
      </button>
    </div>

  </div>
</div>

<!-- ROOMS GRID -->
<div id="roomsGrid"
     class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 px-4 pb-8">
</div>
<div id="dashboardSkeleton" class="px-4 space-y-4 hidden">
  <div class="h-24 bg-gray-200 rounded-2xl animate-pulse"></div>
  <div class="h-24 bg-gray-200 rounded-2xl animate-pulse"></div>
  <div class="h-24 bg-gray-200 rounded-2xl animate-pulse"></div>
</div>



<div id="activeBookingsModal"
     class="fixed inset-0 z-50 hidden">

  <div class="absolute inset-0 bg-black/50"
       onclick="closeActiveBookings()"></div>

  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl max-h-[85vh]">

    <div class="flex items-center justify-between p-4 border-b">
      <h3 class="font-semibold">📅 {{t("active_bookings")}}</h3>
      <button onclick="closeActiveBookings()">✕</button>
    </div>
    <div class="p-3 border-b">
      <input
        id="activeBookingSearch"
        type="text"
        placeholder='{{t("search_by_name_passport_or_phone")}}'
        class="w-full px-4 py-2 rounded-xl border bg-transparent"
      >
    </div>

    <div id="activeBookingsTable"
        class="p-4 overflow-y-auto max-h-[70vh]">
    </div>


  </div>
</div>

<!-- ================= EDIT BOOKING MODAL ================= -->
<div id="editBookingModal"
     class="fixed inset-0 z-50 hidden">

  <div class="absolute inset-0 bg-black/50"
       onclick="closeEditBooking()"></div>

  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl max-h-[90vh] overflow-y-auto">

    <div class="flex items-center justify-between p-4 border-b">
      <h3 class="font-semibold">✏️ {{t("edit_booking")}}</h3>
      <button onclick="closeEditBooking()">✕</button>
    </div>

    <form id="editBookingForm" class="p-4 space-y-4">

      <input type="hidden" id="editBookingId">

      <div>
        <label class="text-sm text-tgHint">{{t("checkout_date")}}</label>
        <input type="date" id="editCheckout"
               class="w-full px-3 py-2 rounded-lg border bg-transparent"
               required>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-sm text-tgHint">{{t("room")}}</label>
          <select id="editRoom"
                  class="w-full px-3 py-2 rounded-lg border bg-transparent"></select>
        </div>

        <div>
          <label class="text-sm text-tgHint">{{t("bed")}}</label>
          <select id="editBed"
                  class="w-full px-3 py-2 rounded-lg border bg-transparent"></select>
        </div>
      </div>

      <div>
        <label class="text-sm text-tgHint">{{t("total_amount")}}</label>
        <input type="number" id="editTotal"
               class="w-full px-3 py-2 rounded-lg border bg-transparent"
               min="0" required>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="flex-1 py-3 rounded-xl bg-tgButton text-white font-semibold">
          💾 {{t("save")}}
        </button>

        <button type="button"
                onclick="closeEditBooking()"
                class="flex-1 py-3 rounded-xl border">
          {{t("cancel")}}
        </button>
      </div>

    </form>
  </div>
</div>


<!-- ================= EDIT FUTURE BOOKING MODAL ================= -->
<div id="editFutureBookingModal"
     class="fixed inset-0 z-50 hidden">

  <div class="absolute inset-0 bg-black/50"
       onclick="closeEditFutureBooking()"></div>

  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl max-h-[90vh] overflow-y-auto">

    <div class="flex items-center justify-between p-4 border-b">
      <h3 class="font-semibold">✏️ {{t("edit_future_booking")}}</h3>
      <button onclick="closeEditFutureBooking()">✕</button>
    </div>

    <form id="editFutureBookingForm" class="p-4 space-y-4">

      <input type="hidden" id="editFutureBookingId">

      <!-- CHECK-IN -->
      <div>
        <label class="text-sm text-tgHint">{{t("checkin_date")}}</label>
        <input type="date" id="editFutureCheckin"
               class="w-full px-3 py-2 rounded-lg border bg-transparent"
               required>
      </div>

      <!-- CHECK-OUT -->
      <div>
        <label class="text-sm text-tgHint">{{t("checkout_date")}}</label>
        <input type="date" id="editFutureCheckout"
               class="w-full px-3 py-2 rounded-lg border bg-transparent"
               required>
      </div>

      <!-- ROOM / BED -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-sm text-tgHint">{{t("room")}}</label>
          <select id="editFutureRoom"
                  class="w-full px-3 py-2 rounded-lg border bg-transparent"></select>
        </div>

        <div>
          <label class="text-sm text-tgHint">{{t("bed")}}</label>
          <select id="editFutureBed"
                  class="w-full px-3 py-2 rounded-lg border bg-transparent"></select>
        </div>
      </div>

      <!-- TOTAL -->
      <div>
        <label class="text-sm text-tgHint">{{t("total_amount")}}</label>
        <input type="number" id="editFutureTotal"
               class="w-full px-3 py-2 rounded-lg border bg-transparent"
               min="0" required>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="flex-1 py-3 rounded-xl bg-tgButton text-white font-semibold">
          💾 {{t("save")}}
        </button>

        <button type="button"
                onclick="closeEditFutureBooking()"
                class="flex-1 py-3 rounded-xl border">
          {{t("cancel")}}
        </button>
      </div>

    </form>
  </div>
</div>


<!-- ================= FUTURE BOOKINGS MODAL ================= -->
<div id="futureBookingsModal"
     class="fixed inset-0 z-50 hidden">

  <div class="absolute inset-0 bg-black/50"
       onclick="closeFutureBookings()"></div>

  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl max-h-[85vh]">

    <div class="flex items-center justify-between p-4 border-b">
      <h3 class="font-semibold">📅 {{t("future_bookings")}}</h3>
      <button onclick="closeFutureBookings()">✕</button>
    </div>

    <div id="futureBookingsTable"
         class="p-4 overflow-y-auto max-h-[70vh]">
    </div>
  </div>
</div>


<!-- ================= REFUNDS MODAL ================= -->



<div id="cancelFutureModal" class="fixed inset-0 z-50 hidden">

  <div class="absolute inset-0 bg-black/50"
       onclick="closeCancelFuture()"></div>

  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-4">

    <div class="flex items-center justify-between mb-2">
      <h3 class="font-semibold">{{ t("cancel_booking") }}</h3>
      <button onclick="closeCancelFuture()" class="text-xl">✕</button>
    </div>

    <p id="paidAmountLabel" class="text-sm mb-2"></p>

    <input id="refundAmount"
           type="number"
           class="w-full mb-2 px-3 py-2 border rounded-lg"
           placeholder="{{ t('refund_amount') }}">

    <input id="refundReason"
           class="w-full mb-3 px-3 py-2 border rounded-lg"
           placeholder="{{ t('refund_reason') }}">

    <button onclick="confirmCancelFuture()"
            class="w-full py-2 bg-red-600 text-white rounded-xl">
      {{ t("confirm_cancel") }}
    </button>

  </div>
</div>




<script src="/static/js/dashboard.js?v={{version}}"></script>



{% endblock %}
