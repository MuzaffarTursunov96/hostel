{% extends "base.html" %}
{% block title %}{{t("customers")}}{% endblock %}

{% block content %}

<!-- <script>

<style>
  /* Customer card */
.customer-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px;
  margin-bottom: 12px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* Left block */
.customer-left {
  display: flex;
  gap: 12px;
  align-items: center;
}

/* Avatar */
.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, #5b8cff, #7aa2ff);
  color: white;
  font-weight: 600;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Info */
.customer-info {
  display: flex;
  flex-direction: column;
}

.customer-name {
  font-size: 16px;
  font-weight: 600;
}

.customer-meta {
  font-size: 13px;
  color: #6b7280;
  line-height: 1.4;
}

/* Actions */
.customer-actions {
  display: flex;
  gap: 8px;
}

.btn-edit {
  padding: 6px 12px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  background: #f9fafb;
  font-size: 13px;
}

.btn-edit:active {
  background: #f3f4f6;
}

.btn-delete {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: none;
  background: #ef4444;
  color: white;
  font-size: 16px;
}

.btn-delete:active {
  background: #dc2626;
}

</style>
<div class="p-4 space-y-4">

  <!-- HEADER -->
  <h1 class="text-xl font-semibold">👤 {{t("customers")}}</h1>

  <!-- SEARCH -->
  <div class="bg-card rounded-2xl p-4 shadow">
    <input
      type="text"
      id="searchCustomer"
      placeholder='{{t("search_by_name_passport_or_phone")}}'
      class="w-full px-4 py-3 rounded-xl border bg-transparent"
    />
  </div>

  <!-- CUSTOMERS LIST -->
  <div class="bg-card rounded-2xl shadow overflow-hidden">
    <div class="px-4 py-3 border-b text-sm text-tgHint">
      {{t("customers")}}
    </div>

    <div id="customersTable" class="divide-y"></div>
  </div>

</div>


<div id="editCustomerModal"
     class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">

  <div class="bg-white rounded-xl w-11/12 max-w-md p-5">
    <h3 class="text-lg font-semibold mb-4">✏️ {{t("edit_customer")}}</h3>

    <input type="hidden" id="editCustomerId">

    <div class="mb-3">
      <label class="text-sm">{{t("customer_name")}}</label>
      <input id="editCustomerName"
             class="w-full border rounded px-3 py-2"
             placeholder="Customer name">
    </div>

    <div class="mb-3">
      <label class="text-sm">{{t("contact_info")}}</label>
      <input id="editCustomerContact"
             class="w-full border rounded px-3 py-2"
             placeholder="+998...">
    </div>

    <div class="mb-4">
      <label class="text-sm">{{t("passport_id")}}</label>
      <input id="editCustomerPassport"
             class="w-full border rounded px-3 py-2"
             placeholder="AB1234567">
    </div>

    <div class="flex justify-end gap-2">
      <button onclick="closeEditCustomer()"
              class="px-4 py-2 border rounded">
        {{t("cancel")}}
      </button>

      <button onclick="saveCustomerEdit()"
              class="px-4 py-2 bg-tgButton text-white rounded">
        {{t("save")}}
      </button>
    </div>
  </div>
</div>
