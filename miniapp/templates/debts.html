{% extends "base.html" %}
{% block title %}Debts{% endblock %}

{% block content %}

<script>
  let CURRENT_BRANCH = {{ current_branch_id }};
</script>

<div class="p-4 space-y-4">

  <!-- HEADER -->
  <h1 class="text-xl font-semibold">💳 {{t("debt_analytics")}}</h1>

  <!-- FILTERS -->
  <div class="bg-card rounded-2xl p-4 shadow space-y-3">

    <div class="flex flex-wrap gap-3 items-center">
      <div>
        <label class="text-sm text-tgHint">{{t("from")}}</label>
        <input type="date" id="fromDate"
               class="px-3 py-2 rounded-lg border bg-transparent">
      </div>

      <div>
        <label class="text-sm text-tgHint">{{t("to")}}</label>
        <input type="date" id="toDate"
               class="px-3 py-2 rounded-lg border bg-transparent">
      </div>

      <button onclick="loadDebts()"
              class="px-5 py-2 rounded-xl bg-tgButton text-white font-medium">
        {{t("confirm")}}
      </button>

      <input
        id="searchInput"
        placeholder='{{t("search_customer_passport")}}'
        class="flex-1 min-w-[180px] px-4 py-2 rounded-xl border bg-transparent"
      >
    </div>

  </div>

  <!-- DEBTS LIST -->
  <div class="bg-card rounded-2xl shadow overflow-hidden">

    <!-- Header (desktop hint) -->
    <div class="hidden sm:grid grid-cols-9 gap-2 px-4 py-3 text-sm text-tgHint border-b">
      <div>{{t("customer")}}</div>
      <div>{{t("passport_id")}}</div>
      <div>{{t("room")}}</div>
      <div>{{t("bed")}}</div>
      <div>{{t("checkin_date")}}</div>
      <div>{{t("checkout_date")}}</div>
      <div class="text-right">{{t("remaining_amount")}}</div>
      <div class="text-center">{{t("pay_amount")}}</div>
      <div></div>
    </div>

    <!-- Body -->
    <div id="debtsTable" class="divide-y">
      <!-- rows injected by JS -->
    </div>

  </div>

</div>

<script src="/static/js/debts.js?v={{version}}"></script>

{% endblock %}
