<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <script>
    // 🔒 Prevent rendering with wrong language
    if (!sessionStorage.getItem("lang_ready")) {
      sessionStorage.setItem("lang_ready", "1");
      const url = window.location.pathname + "?init=1&t=" + Date.now();
      window.location.replace(url);
    }
  </script>

  <style>
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--tg-theme-hint-color);
      text-decoration: none;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      opacity: 0.7;
      transition: opacity 0.2s, transform 0.15s;
    }

    /* active / hover */
    .nav-item.active .nav-icon,
    .nav-item:hover .nav-icon {
      opacity: 1;
      transform: scale(1.05);
    }

    .nav-item.active,
    .nav-item:hover {
      color: var(--tg-theme-button-color);
    }

    .bottom-nav {
      z-index: 40;
    }
  </style>


  <title>{% block title %}App{% endblock %}</title>

  <script>
    window.TRANSLATIONS = {{ TRANSLATIONS | tojson | safe }};
    window.CURRENT_LANG = "{{ session.get('language', 'ru') }}";
    window.ROOT_ADMIN_TELEGRAM = "{{ ROOT_ADMIN_TELEGRAM }}";
    window.ROOT_ADMIN_PHONE = "{{ ROOT_ADMIN_PHONE }}";
  </script>


  <!-- Tailwind CDN (OK for MVP / selling demo) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Telegram Mini App -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- jQuery (your JS depends on it) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Global colors -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            card: '#ffffff',
            tgButton: '#248bda',
            tgHint: '#6b7280'
          }
        }
      }
    }

    
  </script>

<script src="/static/ws.js?v={{version}}"></script>
  <script src="/static/app.js?v={{version}}"></script>
</head>

<body class="bg-gray-100 min-h-full">

  {% include "_sidebar.html" %}

  <!-- MAIN CONTENT -->
  <main class="px-0 md:pl-[240px] pb-[88px]">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
