version: "3.9"

services:
  backend:
    build: ./backend
    container_name: hostel_backend
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  miniapp:
    build: ./miniapp
    container_name: hostel_miniapp
    restart: always
    env_file: .env
    command: gunicorn app:app --bind 0.0.0.0:8002
    expose:
      - "8002"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: hostel_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - miniapp
    restart: always
