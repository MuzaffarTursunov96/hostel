name: flutter_hostel_app
description: Hostel mobile app wrapper for hmsuz.com
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  mapbox_maps_flutter: ^2.19.1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_launcher.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/app_launcher.png

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/uz_regions_cities.json
    - .env
