# ================= UPSTREAMS =================
upstream backend {
    server backend:8000;
}

upstream miniapp {
    server miniapp:8002;
}

# ================= HTTP → HTTPS REDIRECT =================
server {
    listen 80;
    server_name hmsuz.com www.hmsuz.com;

    return 301 https://$host$request_uri;
}

# ================= HTTPS =================
server {
    listen 443 ssl http2;
    server_name hmsuz.com www.hmsuz.com;

    # 🔐 SSL CERTS (FROM CERTBOT)
    ssl_certificate     /etc/letsencrypt/live/hmsuz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hmsuz.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ================= API =================
    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ================= Telegram webhook =================
    location /tg/webhook {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ================= WebSocket =================
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ================= Mini App =================
    location / {
        proxy_pass http://miniapp;
        proxy_set_header Host $host;
    }
}
